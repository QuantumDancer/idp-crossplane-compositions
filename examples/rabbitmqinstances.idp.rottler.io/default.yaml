apiVersion: idp.rottler.io/v1alpha1
kind: RabbitMQInstance
metadata:
  name: order-service-mq
  namespace: team-a-order-management-order-service
spec:
  team: team-a
  environment: homelab
  clusterRef:
    name: team-a-rabbitmq
    namespace: team-a-infra
  durability: persistent
  exchanges:
    - name: orders
      type: topic
  queues:
    - name: order-created
      exchange: orders
      routingKey: "order.created"
    - name: order-processed
      exchange: orders
      routingKey: "order.processed"
    - name: order-retry
      exchange: orders
      routingKey: "order.retry"
      type: quorum
      deliveryLimit: 3
      deadLetterQueue: order-retry-dlq
    - name: order-retry-dlq
