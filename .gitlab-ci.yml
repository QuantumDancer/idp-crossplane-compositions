# THROWAWAY branch pipeline — network diagnostics for the TechDocs S3 upload
# stalls (see CI_TECHDOCS_PUBLISH_ISSUE.md §9). Runs in a real job container on
# the real runner, where the failure happens. Never merge this branch.
stages: [debug]

net-debug:
  stage: debug
  image: alpine:3.21
  timeout: 20m
  variables:
    DIRECT: "http://s3-direct.garage.k8s.home.rottlr.de:3900"
    GATEWAY: "https://s3.garage.k8s.home.rottlr.de"
  script:
    - apk add --no-cache curl iputils iproute2 bind-tools coreutils
    - echo "=== container network ==="
    - ip -o link show
    - ip route
    - echo "=== DNS ==="
    - nslookup s3-direct.garage.k8s.home.rottlr.de || true
    - echo "=== DF ping sweep to 192.168.31.11 (payload sizes; +28 = packet size) ==="
    - for s in 1472 1452 1424 1400 1300 500; do ping -M do -c1 -W2 -s $s 192.168.31.11 >/dev/null 2>&1 && echo "DF ping $s OK" || echo "DF ping $s FAIL"; done
    - echo "=== tracepath (PMTU discovery) ==="
    - tracepath -n -m 8 192.168.31.11 || true
    - echo "=== sized PUTs, direct endpoint ==="
    # curl exit != 0 (timeout/conn) and HTTP >= 400 (-f) both count as FAIL.
    # The size where PUTs start failing discriminates: ~1 KB-threshold = MSS/MTU
    # blackhole; ~1 MiB = proxy buffer; all pass = problem is elsewhere.
    - |
      for kb in 1 8 64 256 1024 3072; do
        dd if=/dev/urandom of=/tmp/f bs=1024 count=$kb 2>/dev/null
        t0=$(date +%s)
        if curl -sf -o /dev/null --max-time 60 --aws-sigv4 "aws:amz:${AWS_REGION}:s3" \
             --user "${AWS_ACCESS_KEY_ID}:${AWS_SECRET_ACCESS_KEY}" \
             -X PUT --data-binary @/tmp/f "${DIRECT}/techdocs/__net-debug-${kb}k"; then
          echo "PUT ${kb}KB direct OK ($(( $(date +%s) - t0 ))s)"
        else
          echo "PUT ${kb}KB direct FAIL rc=$? ($(( $(date +%s) - t0 ))s)"
        fi
      done
    # A 256 KB PUT stalls at full speed. If it succeeds when rate-limited (which
    # keeps TCP bursts small and prevents GSO/TSO frame coalescing on the sender),
    # the drop is burst/offload-related on the virtualized path, not size-related.
    - echo "=== rate-limited PUTs, direct endpoint ==="
    - |
      for rate in 32K 128K 512K; do
        dd if=/dev/urandom of=/tmp/f bs=1024 count=256 2>/dev/null
        t0=$(date +%s)
        if curl -sf -o /dev/null --max-time 90 --limit-rate $rate --aws-sigv4 "aws:amz:${AWS_REGION}:s3" \
             --user "${AWS_ACCESS_KEY_ID}:${AWS_SECRET_ACCESS_KEY}" \
             -X PUT --data-binary @/tmp/f "${DIRECT}/techdocs/__net-debug-rate"; then
          echo "PUT 256KB at ${rate}/s direct OK ($(( $(date +%s) - t0 ))s)"
        else
          echo "PUT 256KB at ${rate}/s direct FAIL rc=$? ($(( $(date +%s) - t0 ))s)"
        fi
      done
    # Dump TCP socket state mid-stall: high retrans + growing unacked = packets
    # are being dropped in flight; rcv window 0 = the peer stopped reading.
    - echo "=== socket state during a stalled 3MB PUT ==="
    - |
      dd if=/dev/urandom of=/tmp/f bs=1024 count=3072 2>/dev/null
      curl -s -o /dev/null --max-time 30 --aws-sigv4 "aws:amz:${AWS_REGION}:s3" \
        --user "${AWS_ACCESS_KEY_ID}:${AWS_SECRET_ACCESS_KEY}" \
        -X PUT --data-binary @/tmp/f "${DIRECT}/techdocs/__net-debug-stall" &
      sleep 8; ss -tin dst 192.168.31.11 || true
      sleep 8; ss -tin dst 192.168.31.11 || true
      wait || true
    - echo "=== sized PUTs, gateway endpoint (A/B) ==="
    - |
      for kb in 256 1024 3072; do
        dd if=/dev/urandom of=/tmp/f bs=1024 count=$kb 2>/dev/null
        t0=$(date +%s)
        if curl -sf -o /dev/null --max-time 60 --aws-sigv4 "aws:amz:${AWS_REGION}:s3" \
             --user "${AWS_ACCESS_KEY_ID}:${AWS_SECRET_ACCESS_KEY}" \
             -X PUT --data-binary @/tmp/f "${GATEWAY}/techdocs/__net-debug-${kb}k"; then
          echo "PUT ${kb}KB gateway OK ($(( $(date +%s) - t0 ))s)"
        else
          echo "PUT ${kb}KB gateway FAIL rc=$? ($(( $(date +%s) - t0 ))s)"
        fi
      done
    - echo "=== cleanup ==="
    - |
      for kb in 1 8 64 256 1024 3072; do
        curl -s -o /dev/null --aws-sigv4 "aws:amz:${AWS_REGION}:s3" \
          --user "${AWS_ACCESS_KEY_ID}:${AWS_SECRET_ACCESS_KEY}" \
          -X DELETE "${DIRECT}/techdocs/__net-debug-${kb}k" || true
      done
  rules:
    - if: $CI_COMMIT_BRANCH == "ci-net-debug"
