---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: {{ printf "repo-%s-%s-%s-deployment" $team $system $component }}
  namespace: argocd
  annotations:
    gotemplating.fn.crossplane.io/composition-resource-name: argocd-repo-secret
spec:
  secretStoreRef:
    name: vault-backend
    kind: ClusterSecretStore
  refreshInterval: "1h0m0s"
  target:
    template:
      metadata:
        labels:
          argocd.argoproj.io/secret-type: repository
      data:
        type: git
        url: {{ printf "https://gitlab.home.rottlr.de/idp/%s/%s-%s-deployment.git" $team $system $component }}
        username: "{{ `{{ .username }}` }}"
        password: "{{ `{{ .password }}` }}"
        project: {{ $team }}
  dataFrom:
  - extract:
      key: idp/platform/argocd/idp-group-pull-secret
      conversionStrategy: Default
      decodingStrategy: None
      metadataPolicy: None
