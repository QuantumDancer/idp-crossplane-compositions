---
# Patch the XR status from the Dragonfly resource's observed state.
#
# function-auto-ready is not used here: the Dragonfly operator signals health via
# status.phase ("Ready"), not the standard Ready condition auto-ready inspects.
# The gotemplating.fn.crossplane.io/ready annotation drives the XR's Ready
# condition directly from that phase ($ready is computed in variables.yaml) —
# the same approach as RabbitMQCluster.
apiVersion: idp.rottler.io/v1alpha1
kind: KeyValueStore
metadata:
  annotations:
    gotemplating.fn.crossplane.io/ready: "{{ if $ready }}True{{ else }}False{{ end }}"
status:
  ready: {{ $ready }}
  phase: {{ if $ready }}Running{{ else }}Provisioning{{ end }}
  connectionSecretRef: {{ $secretName }}
