---
# Connection Secret, created first so the Dragonfly resource can reference its
# `password` key via spec.authentication.passwordFromSecret. Mounted directly by
# the consuming workloads (envFrom.secretRef) — no Vault/ESO indirection, the
# same model as a RabbitMQInstance connection Secret.
apiVersion: v1
kind: Secret
metadata:
  name: {{ $secretName }}
  namespace: {{ $namespace }}
  labels:
    {{- range $key, $value := $labels }}
    {{ $key }}: {{ $value | quote }}
    {{- end }}
  annotations:
    gotemplating.fn.crossplane.io/composition-resource-name: connection-secret
type: Opaque
stringData:
  host: {{ $host }}
  port: {{ $port | quote }}
  {{- if $auth }}
  password: {{ $password }}
  {{- end }}
  # url and uri are identical; both keys are provided so consumers can use either
  # convention (REDIS_URL is the de-facto standard env var name).
  url: {{ $url }}
  uri: {{ $url }}
