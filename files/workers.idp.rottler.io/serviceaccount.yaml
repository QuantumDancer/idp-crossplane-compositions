{{- if not $externalSA }}
---
# Present unless an external SA is supplied, so the Deployment has a stable identity.
# The token is only mounted when the workload needs API access (kubernetesAccess.enabled).
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ $xrName }}
  labels:
    {{- range $key, $value := $labels }}
    {{ $key }}: {{ $value | quote }}
    {{- end }}
  annotations:
    gotemplating.fn.crossplane.io/composition-resource-name: serviceaccount
automountServiceAccountToken: {{ $accessEnabled }}
{{- end }}
