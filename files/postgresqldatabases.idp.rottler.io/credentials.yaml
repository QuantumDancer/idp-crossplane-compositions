{{- if eq $secretType "pull" }}
---
# Pull existing credentials from Vault into a Kubernetes Secret.
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: {{ $xrName }}-external-secret
  labels:
    {{- range $key, $value := $labels }}
    {{ $key }}: {{ $value | quote }}
    {{- end }}
  annotations:
    gotemplating.fn.crossplane.io/composition-resource-name: external-secret
spec:
  secretStoreRef:
    name: vault-backend
    kind: ClusterSecretStore
  refreshInterval: "1h0m0s"
  target:
    name: {{ $secretName }}
    creationPolicy: Owner
  dataFrom:
    - extract:
        key: {{ $vaultPath }}
        conversionStrategy: Default
        decodingStrategy: None
        metadataPolicy: None
{{- end }}
{{- if eq $secretType "push" }}
---
# Generate a random password and store it as a Kubernetes Secret.
# randAlphaNum produces a new value on each reconcile, but Crossplane's
# observed state is used after the first successful apply, so the password
# is stable after creation.
apiVersion: v1
kind: Secret
metadata:
  name: {{ $secretName }}
  labels:
    {{- range $key, $value := $labels }}
    {{ $key }}: {{ $value | quote }}
    {{- end }}
  annotations:
    gotemplating.fn.crossplane.io/composition-resource-name: database-secret
type: Opaque
stringData:
  username: {{ $owner }}
  password: {{ randAlphaNum 32 }}
---
# Push the generated credentials to Vault so other services can consume them.
apiVersion: external-secrets.io/v1alpha1
kind: PushSecret
metadata:
  name: {{ $xrName }}-push-secret
  labels:
    {{- range $key, $value := $labels }}
    {{ $key }}: {{ $value | quote }}
    {{- end }}
  annotations:
    gotemplating.fn.crossplane.io/composition-resource-name: push-secret
spec:
  refreshInterval: 1h
  secretStoreRefs:
    - name: vault-backend
      kind: ClusterSecretStore
  selector:
    secret:
      name: {{ $secretName }}
  data:
    - match:
        secretKey: username
        remoteRef:
          remoteKey: {{ $vaultPath }}
          property: username
    - match:
        secretKey: password
        remoteRef:
          remoteKey: {{ $vaultPath }}
          property: password
{{- end }}
