{{- if $pdbEnabled }}
---
# Composed automatically once the workload runs more than one replica.
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: {{ $xrName }}
  labels:
    {{- range $key, $value := $labels }}
    {{ $key }}: {{ $value | quote }}
    {{- end }}
  annotations:
    gotemplating.fn.crossplane.io/composition-resource-name: poddisruptionbudget
spec:
  maxUnavailable: 1
  selector:
    matchLabels:
      {{- range $key, $value := $selectorLabels }}
      {{ $key }}: {{ $value | quote }}
      {{- end }}
{{- end }}
