{{- if $exposed }}
---
# The platform owns the Gateway; developers only choose the hostname.
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: {{ $xrName }}
  labels:
    {{- range $key, $value := $labels }}
    {{ $key }}: {{ $value | quote }}
    {{- end }}
  annotations:
    gotemplating.fn.crossplane.io/composition-resource-name: httproute
spec:
  parentRefs:
    - name: external
      namespace: gateway
  hostnames:
    - {{ $fqdn | quote }}
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: {{ $exposePath }}
      backendRefs:
        - group: ""
          kind: Service
          name: {{ $xrName }}
          port: {{ $port }}
          weight: 1
{{- end }}
