{{- range $i, $item := $envFrom }}
{{- if $item.vaultPath }}
---
# Vault-backed envFrom entry: pulls every key at the path into a Secret the
# Deployment consumes via envFrom. The developer-supplied name keeps the Secret
# stable regardless of envFrom ordering.
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: {{ printf "%s-%s" $xrName $item.name }}
  labels:
    {{- range $key, $value := $labels }}
    {{ $key }}: {{ $value | quote }}
    {{- end }}
  annotations:
    gotemplating.fn.crossplane.io/composition-resource-name: {{ printf "env-secret-%s" $item.name }}
spec:
  secretStoreRef:
    name: vault-backend
    kind: ClusterSecretStore
  refreshInterval: 1h0m0s
  target:
    name: {{ printf "%s-%s" $xrName $item.name }}
    creationPolicy: Owner
  dataFrom:
    - extract:
        key: {{ $item.vaultPath }}
        conversionStrategy: Default
        decodingStrategy: None
        metadataPolicy: None
{{- end }}
{{- end }}
