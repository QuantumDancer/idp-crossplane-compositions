---
# Pulls the platform group registry credentials from Vault and renders them as a
# dockerconfigjson Secret. The templating inside .dockerconfigjson belongs to ESO
# (emitted verbatim from a Go raw string) and is evaluated by External Secrets, not here.
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: {{ $imagePullSecretName }}
  labels:
    {{- range $key, $value := $labels }}
    {{ $key }}: {{ $value | quote }}
    {{- end }}
  annotations:
    gotemplating.fn.crossplane.io/composition-resource-name: image-pull-secret
spec:
  secretStoreRef:
    name: vault-backend
    kind: ClusterSecretStore
  refreshInterval: 1h0m0s
  target:
    name: {{ $imagePullSecretName }}
    creationPolicy: Owner
    template:
      type: kubernetes.io/dockerconfigjson
      data:
        # Inject $registry by concatenation, NOT printf: a wrapping printf would
        # consume ESO's own `%s:%s` (meant for ESO to evaluate later) as format
        # verbs and emit %!s(MISSING). The ESO directives are backtick raw strings
        # so the outer render passes them through verbatim.
        .dockerconfigjson: '{"auths":{"{{ $registry }}":{"username":"{{ `{{ .username }}` }}","password":"{{ `{{ .password }}` }}","auth":"{{ `{{ printf "%s:%s" .username .password | b64enc }}` }}"}}}'
  data:
    - secretKey: username
      remoteRef:
        key: {{ $pullVaultPath }}
        property: username
    - secretKey: password
      remoteRef:
        key: {{ $pullVaultPath }}
        property: password
