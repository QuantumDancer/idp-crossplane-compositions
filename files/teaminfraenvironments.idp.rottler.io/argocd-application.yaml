---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: {{ printf "%s-infra" $team }}
  namespace: argocd
  annotations:
    gotemplating.fn.crossplane.io/composition-resource-name: argocd-application
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: {{ $team }}

  source:
    repoURL: {{ printf "https://gitlab.home.rottlr.de/idp/%s/%s-infra.git" $team $team }}
    targetRevision: main
    path: ./
    directory:
      # The repo root also contains the Backstage entity file, which is not a
      # Kubernetes manifest and must not be applied to the cluster.
      exclude: catalog-info.yaml

  destination:
    server: https://kubernetes.default.svc
    namespace: {{ printf "%s-infra" $team }}

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
