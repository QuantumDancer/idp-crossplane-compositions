---
apiVersion: rabbitmq.com/v1beta1
kind: Vhost
metadata:
  name: {{ $xrName }}-vhost
  namespace: {{ $namespace }}
  labels:
    {{- range $key, $value := $labels }}
    {{ $key }}: {{ $value | quote }}
    {{- end }}
  annotations:
    gotemplating.fn.crossplane.io/composition-resource-name: vhost
spec:
  name: {{ $vhostName }}
  rabbitmqClusterReference:
    name: {{ $clusterName }}
    namespace: {{ $clusterNamespace }}
