{{- $xrName := .observed.composite.resource.metadata.name -}}
{{- $namespace := .observed.composite.resource.metadata.namespace -}}
{{- $team := .observed.composite.resource.spec.team -}}
{{- $environment := .observed.composite.resource.spec.environment -}}
{{- $clusterName := .observed.composite.resource.spec.clusterRef.name -}}
{{- $clusterNamespace := .observed.composite.resource.spec.clusterRef.namespace -}}
{{- $vhostName := printf "%s-%s" $namespace $xrName -}}
{{- $secretName := printf "%s-connection" $xrName -}}
{{- $durability := .observed.composite.resource.spec.durability | default "persistent" -}}
{{- $durable := eq $durability "persistent" -}}
{{- $exchanges := .observed.composite.resource.spec.exchanges | default (list) -}}
{{- $queues := .observed.composite.resource.spec.queues | default (list) -}}
{{- $password := randAlphaNum 32 -}}
{{- /* Reuse the password from the already-applied connection Secret so it stays
       stable across reconciles. function-go-templating exposes observed composed
       resources under .observed.resources (NOT .observed.composedResources) — the
       wrong key left this branch dead, regenerating the password every reconcile
       so it diverged from the RabbitMQ user created on the first apply. */ -}}
{{- if .observed.resources -}}
  {{- $observedSecret := index .observed.resources "connection-secret" -}}
  {{- if and $observedSecret $observedSecret.resource.data.password -}}
    {{- $password = $observedSecret.resource.data.password | b64dec -}}
  {{- end -}}
{{- end -}}

{{- $labels := dict
  "app.kubernetes.io/name" "rabbitmq-instance"
  "app.kubernetes.io/instance" $xrName
  "app.kubernetes.io/component" "messaging"
  "app.kubernetes.io/managed-by" "crossplane"
  "idp.rottler.io/team" $team
  "idp.rottler.io/environment" $environment
-}}
