{{- range $queues }}
---
apiVersion: rabbitmq.com/v1beta1
kind: Queue
metadata:
  name: {{ $xrName }}-queue-{{ .name }}
  namespace: {{ $namespace }}
  labels:
    {{- range $key, $value := $labels }}
    {{ $key }}: {{ $value | quote }}
    {{- end }}
  annotations:
    gotemplating.fn.crossplane.io/composition-resource-name: queue-{{ .name }}
spec:
  name: {{ .name }}
  vhost: {{ $vhostName }}
  durable: {{ $durable }}
  type: {{ .type | default "classic" }}
  {{- if or .deadLetterQueue .deliveryLimit }}
  arguments:
    {{- if .deadLetterQueue }}
    x-dead-letter-exchange: ""
    x-dead-letter-routing-key: {{ .deadLetterQueue }}
    {{- end }}
    {{- if .deliveryLimit }}
    x-delivery-limit: {{ .deliveryLimit }}
    {{- end }}
  {{- end }}
  rabbitmqClusterReference:
    name: {{ $clusterName }}
    namespace: {{ $clusterNamespace }}
{{- end }}
