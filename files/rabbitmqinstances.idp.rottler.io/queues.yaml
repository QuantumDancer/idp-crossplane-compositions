{{- range $queues }}
---
apiVersion: rabbitmq.com/v1beta1
kind: Queue
metadata:
  name: {{ $xrName }}-queue-{{ .name }}
  namespace: {{ $namespace }}
  labels:
    {{- range $key, $value := $labels }}
    {{ $key }}: {{ $value | quote }}
    {{- end }}
  annotations:
    gotemplating.fn.crossplane.io/composition-resource-name: queue-{{ .name }}
spec:
  name: {{ .name }}
  vhost: {{ $vhostName }}
  durable: {{ $durable }}
  rabbitmqClusterReference:
    name: {{ $clusterName }}
    namespace: {{ $clusterNamespace }}
{{- end }}
