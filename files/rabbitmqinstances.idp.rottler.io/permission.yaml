---
apiVersion: rabbitmq.com/v1beta1
kind: Permission
metadata:
  name: {{ $xrName }}-permission
  namespace: {{ $namespace }}
  labels:
    {{- range $key, $value := $labels }}
    {{ $key }}: {{ $value | quote }}
    {{- end }}
  annotations:
    gotemplating.fn.crossplane.io/composition-resource-name: permission
spec:
  vhost: {{ $vhostName }}
  # Use 'user' (username string) rather than 'userReference' (resource ref). The topology
  # operator calls SetControllerReference when a userReference is present, which conflicts
  # with Crossplane's own controller ownerReference on this composed resource.
  user: {{ $xrName }}
  rabbitmqClusterReference:
    name: {{ $clusterName }}
    namespace: {{ $clusterNamespace }}
  permissions:
    read: ".*"
    write: ".*"
    configure: ".*"
