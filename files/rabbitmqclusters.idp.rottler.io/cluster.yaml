---
apiVersion: rabbitmq.com/v1beta1
kind: RabbitmqCluster
metadata:
  name: {{ $xrName }}
  labels:
    {{- range $key, $value := $labels }}
    {{ $key }}: {{ $value | quote }}
    {{- end }}
  annotations:
    gotemplating.fn.crossplane.io/composition-resource-name: rabbitmq-cluster
    # Required for RabbitMQInstance topology resources (Vhost, User, Queue, etc.)
    # to be accepted when they reference this cluster from a different namespace.
    rabbitmq.com/topology-allowed-namespaces: {{ $allowedNamespacesValue }}
spec:
  replicas: {{ $replicas }}
  image: rabbitmq:{{ $version }}-management
  persistence:
    storage: {{ $storageSize }}
  # The cluster-operator derives RabbitMQ's memory high-watermark from the pod
  # memory limit, so the limit is the real sizing lever. request==limit gives the
  # broker a Guaranteed-QoS pod and a stable watermark. Sized per storage tier in
  # variables.yaml to keep disk_free_limit >= RAM and PVC comfortably > RAM.
  resources:
    requests:
      memory: {{ $memory }}
    limits:
      memory: {{ $memory }}
  rabbitmq:
    # Override the operator's default disk_free_limit.absolute=2GB, which exceeds
    # the smaller PVCs and keeps the disk-free alarm permanently on (it blocks all
    # publishers). Sized per storage tier in variables.yaml.
    additionalConfig: |
      disk_free_limit.absolute = {{ $diskFreeLimit }}
  {{- if $ha }}
  # Spread replicas across nodes to survive single-node failures.
  affinity:
    podAntiAffinity:
      requiredDuringSchedulingIgnoredDuringExecution:
      - labelSelector:
          matchLabels:
            app.kubernetes.io/name: {{ $xrName }}
        topologyKey: kubernetes.io/hostname
  {{- end }}
