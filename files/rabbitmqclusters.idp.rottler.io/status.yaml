---
# Patch the XR status from the RabbitmqCluster's observed state.
#
# We do not use function-auto-ready here because the RabbitMQ Cluster Operator
# uses AllReplicasReady rather than the standard Ready condition. The
# gotemplating.fn.crossplane.io/ready annotation on the composite patch drives
# the XR's Ready condition directly from AllReplicasReady.
apiVersion: idp.rottler.io/v1alpha1
kind: RabbitMQCluster
metadata:
  annotations:
    gotemplating.fn.crossplane.io/ready: "{{ if $clusterReady }}True{{ else }}False{{ end }}"
status:
  ready: {{ $clusterReady }}
  phase: {{ if $clusterReady }}Running{{ else }}Provisioning{{ end }}
