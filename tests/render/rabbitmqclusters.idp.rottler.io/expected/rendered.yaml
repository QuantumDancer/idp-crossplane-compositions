apiVersion: idp.rottler.io/v1alpha1
kind: RabbitMQCluster
metadata:
  name: team-a-rabbitmq
  namespace: team-a-infra
spec:
  crossplane:
    resourceRefs:
    - apiVersion: rabbitmq.com/v1beta1
      kind: RabbitmqCluster
      name: team-a-rabbitmq
status:
  conditions:
  - lastTransitionTime: "TIMESTAMP"
    reason: WatchCircuitClosed
    status: "True"
    type: Responsive
  - lastTransitionTime: "TIMESTAMP"
    reason: ReconcileSuccess
    status: "True"
    type: Synced
  - lastTransitionTime: "TIMESTAMP"
    reason: Creating
    status: "False"
    type: Ready
  phase: Provisioning
  ready: false
---
apiVersion: rabbitmq.com/v1beta1
kind: RabbitmqCluster
metadata:
  annotations:
    crossplane.io/composition-resource-name: rabbitmq-cluster
    rabbitmq.com/topology-allowed-namespaces: team-a-order-management-order-service
  labels:
    app.kubernetes.io/component: messaging
    app.kubernetes.io/instance: team-a-rabbitmq
    app.kubernetes.io/managed-by: crossplane
    app.kubernetes.io/name: rabbitmq-cluster
    crossplane.io/composite: team-a-rabbitmq
    idp.rottler.io/environment: homelab
    idp.rottler.io/team: team-a
  name: team-a-rabbitmq
  namespace: team-a-infra
  ownerReferences:
  - apiVersion: idp.rottler.io/v1alpha1
    blockOwnerDeletion: true
    controller: true
    kind: RabbitMQCluster
    name: team-a-rabbitmq
    uid: UID
spec:
  image: rabbitmq:3.13-management
  persistence:
    storage: 1Gi
  rabbitmq:
    additionalConfig: |
      disk_free_limit.absolute = 256MB
  replicas: 1
