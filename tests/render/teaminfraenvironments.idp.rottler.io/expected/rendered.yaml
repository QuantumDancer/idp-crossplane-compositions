apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  annotations:
    crossplane.io/composition-resource-name: argocd-application
  finalizers:
  - resources-finalizer.argocd.argoproj.io
  labels:
    crossplane.io/composite: team-a
  name: team-a-infra
  namespace: argocd
  ownerReferences:
  - apiVersion: idp.rottler.io/v1alpha1
    blockOwnerDeletion: true
    controller: true
    kind: TeamInfraEnvironment
    name: team-a
    uid: UID
spec:
  destination:
    namespace: team-a-infra
    server: https://kubernetes.default.svc
  project: team-a
  source:
    directory:
      exclude: '{catalog-info.yaml,*-catalog-info.yaml}'
    path: ./
    repoURL: https://gitlab.home.rottlr.de/idp/team-a/team-a-infra.git
    targetRevision: main
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  annotations:
    crossplane.io/composition-resource-name: argocd-repo-secret
  labels:
    crossplane.io/composite: team-a
  name: repo-team-a-infra
  namespace: argocd
  ownerReferences:
  - apiVersion: idp.rottler.io/v1alpha1
    blockOwnerDeletion: true
    controller: true
    kind: TeamInfraEnvironment
    name: team-a
    uid: UID
spec:
  dataFrom:
  - extract:
      conversionStrategy: Default
      decodingStrategy: None
      key: idp/platform/argocd/idp-group-pull-secret
      metadataPolicy: None
  refreshInterval: 1h0m0s
  secretStoreRef:
    kind: ClusterSecretStore
    name: vault-backend
  target:
    template:
      data:
        password: '{{ .password }}'
        project: team-a
        type: git
        url: https://gitlab.home.rottlr.de/idp/team-a/team-a-infra.git
        username: '{{ .username }}'
      metadata:
        labels:
          argocd.argoproj.io/secret-type: repository
---
apiVersion: idp.rottler.io/v1alpha1
kind: TeamInfraEnvironment
metadata:
  name: team-a
spec:
  crossplane:
    resourceRefs:
    - apiVersion: argoproj.io/v1alpha1
      kind: Application
      name: team-a-infra
      namespace: argocd
    - apiVersion: external-secrets.io/v1
      kind: ExternalSecret
      name: repo-team-a-infra
      namespace: argocd
    - apiVersion: v1
      kind: Namespace
      name: team-a-infra
status:
  conditions:
  - lastTransitionTime: "TIMESTAMP"
    reason: WatchCircuitClosed
    status: "True"
    type: Responsive
  - lastTransitionTime: "TIMESTAMP"
    reason: ReconcileSuccess
    status: "True"
    type: Synced
  - lastTransitionTime: "TIMESTAMP"
    message: 'Unready resources: argocd-application, argocd-repo-secret, and namespace'
    reason: Creating
    status: "False"
    type: Ready
---
apiVersion: v1
kind: Namespace
metadata:
  annotations:
    crossplane.io/composition-resource-name: namespace
  labels:
    crossplane.io/composite: team-a
  name: team-a-infra
  ownerReferences:
  - apiVersion: idp.rottler.io/v1alpha1
    blockOwnerDeletion: true
    controller: true
    kind: TeamInfraEnvironment
    name: team-a
    uid: UID
spec: {}
