# Minimal CRD stub for ESO ExternalSecret (v1). No ESO controller required —
# this only registers the type so Crossplane can create ExternalSecret objects.
# Must be v1 (not v1beta1) to match what argocd-repo-secret.yaml emits.
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: externalsecrets.external-secrets.io
spec:
  group: external-secrets.io
  scope: Namespaced
  names:
    kind: ExternalSecret
    listKind: ExternalSecretList
    plural: externalsecrets
    singular: externalsecret
  versions:
  - name: v1
    served: true
    storage: true
    schema:
      openAPIV3Schema:
        type: object
        x-kubernetes-preserve-unknown-fields: true
