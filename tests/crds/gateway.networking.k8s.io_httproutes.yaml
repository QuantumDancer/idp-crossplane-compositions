# Minimal CRD stub for Gateway API HTTPRoute (v1). No Gateway controller
# required — this only registers the type so Crossplane can create HTTPRoute
# objects composed by WebService.
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: httproutes.gateway.networking.k8s.io
  annotations:
    # Required for CRDs in the protected *.k8s.io group. Points at the upstream
    # Gateway API approval PR; the API server only checks the annotation exists.
    api-approved.kubernetes.io: https://github.com/kubernetes-sigs/gateway-api/pull/1606
spec:
  group: gateway.networking.k8s.io
  scope: Namespaced
  names:
    kind: HTTPRoute
    listKind: HTTPRouteList
    plural: httproutes
    singular: httproute
  versions:
  - name: v1
    served: true
    storage: true
    schema:
      openAPIV3Schema:
        type: object
        x-kubernetes-preserve-unknown-fields: true
