apiVersion: idp.rottler.io/v1alpha1
kind: WebService
metadata:
  name: watermarkflow-static
spec:
  team: team-a
  environment: homelab
  image:
    repository: gitlab.home.rottlr.de:5050/idp/team-a/watermarkflow-static
    tag: "a1b2c3d4"
  port: 8080
  compute: small
  expose:
    hostname: watermarkflow-static
  # A static site with no /metrics endpoint: the composition must compose no
  # ServiceMonitor. Covers the metrics.enabled:false branch of variables.yaml.
  metrics:
    enabled: false
