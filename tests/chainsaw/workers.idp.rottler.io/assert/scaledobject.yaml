apiVersion: keda.sh/v1alpha1
kind: ScaledObject
metadata:
  name: watermarkflow-worker
spec:
  scaleTargetRef:
    name: watermarkflow-worker
  minReplicaCount: 0
  maxReplicaCount: 10
  triggers:
    - type: rabbitmq
      metadata:
        queueName: watermark.jobs
        mode: QueueLength
        value: "5"
      authenticationRef:
        name: watermarkflow-worker-trigger-auth
